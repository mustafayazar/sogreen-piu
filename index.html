<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SoGreen PIU</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1A1D21;--bg2:#222529;--bg3:#2C2F33;--bg4:#36393f;
  --accent:#1D9E75;--accent-l:#EAF3DE;--accent-d:#27500A;
  --blue:#5B8DEF;--blue-l:#E8F0FF;--blue-d:#2B4A99;
  --amber:#F0A500;--amber-l:#FFF3CD;--amber-d:#7A5000;
  --red:#E24B4A;--red-l:#FFE8E8;--red-d:#8B1A1A;
  --purple:#7C5CBF;--purple-l:#EDE8FF;
  --text:#DCDDDE;--text2:#96989D;--text3:#6D6F78;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --white:#FFFFFF;--sidebar-w:240px;--ch-w:220px;
}
html,body{height:100%;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── LEFT SIDEBAR (Slack-style) ── */
#sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.ws-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer}
.ws-icon{width:34px;height:34px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ws-name{font-size:15px;font-weight:700;color:var(--white);line-height:1.2}
.ws-status{font-size:11px;color:var(--accent);display:flex;align-items:center;gap:4px}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block}

.sb-scroll{flex:1;overflow-y:auto;padding:8px 0}
.sb-section{padding:4px 0 2px}
.sb-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:6px 16px 4px;display:flex;align-items:center;justify-content:space-between}
.sb-label button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px}
.sb-label button:hover{color:var(--text)}

.nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:5px 16px;border:none;background:none;color:var(--text2);font-size:14px;font-weight:400;text-align:left;cursor:pointer;border-radius:0;transition:background .1s,color .1s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--white)}
.nav-item.active{background:rgba(29,158,117,.25);color:var(--white);font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}
.nav-bullet{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;margin-left:2px}
.nav-item.active .nav-bullet{background:var(--accent)}

.ch-item{display:flex;align-items:center;gap:8px;width:100%;padding:4px 16px;border:none;background:none;color:var(--text3);font-size:14px;text-align:left;cursor:pointer;transition:background .1s,color .1s;border-radius:0}
.ch-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.ch-item.active{background:rgba(29,158,117,.22);color:var(--white);font-weight:500}
.ch-hash{font-size:15px;opacity:.5;flex-shrink:0;line-height:1}
.ch-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--white);margin-left:auto;flex-shrink:0}
.ch-unread-num{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}

.dm-item{display:flex;align-items:center;gap:8px;width:100%;padding:4px 16px;border:none;background:none;color:var(--text3);font-size:13px;text-align:left;cursor:pointer;transition:background .1s,color .1s}
.dm-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.dm-item.active{background:rgba(29,158,117,.22);color:var(--white);font-weight:500}
.dm-av{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.dm-online{width:8px;height:8px;border-radius:50%;background:#23D160;border:2px solid var(--bg2);position:absolute;bottom:-2px;right:-2px}

.sb-user{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;background:var(--bg2)}
.user-av{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.user-av-online{width:10px;height:10px;border-radius:50%;background:#23D160;border:2px solid var(--bg2);position:absolute;bottom:-2px;right:-2px}
.user-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-status{font-size:11px;color:var(--text3)}
.logout-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:4px;flex-shrink:0}
.logout-btn:hover{color:var(--text);background:rgba(255,255,255,.08)}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── TOPBAR ── */
#topbar{height:48px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.tb-icon{width:20px;height:20px;opacity:.6}
.tb-title{font-size:15px;font-weight:700;color:var(--white)}
.tb-desc{font-size:12px;color:var(--text3);margin-left:2px}
.tb-divider{width:1px;height:20px;background:var(--border2);margin:0 4px}
.tb-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s}
.tb-btn-primary{background:var(--accent);color:#fff}
.tb-btn-primary:hover{opacity:.88}
.tb-btn-ghost{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border2)}
.tb-btn-ghost:hover{background:rgba(255,255,255,.12)}

/* ── VIEW TABS (Asana-style) ── */
#view-tabs{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;flex-shrink:0;overflow-x:auto}
#view-tabs::-webkit-scrollbar{height:2px}
.vtab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .12s,border-color .12s;display:flex;align-items:center;gap:6px}
.vtab:hover{color:var(--text)}
.vtab.active{color:var(--white);border-bottom-color:var(--accent);font-weight:600}
.vtab-count{font-size:11px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.1);color:var(--text3)}
.vtab.active .vtab-count{background:rgba(29,158,117,.3);color:var(--accent-l)}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:0}
.page-pad{padding:20px 22px}

/* ── TASK BOARD (Asana list view) ── */
.task-list-header{display:flex;align-items:center;padding:8px 16px;background:var(--bg2);border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;gap:10px}
.task-list-header .th-title{flex:1}
.task-list-header .th-meta{display:flex;gap:20px}
.th-col{width:90px;text-align:center}

.task-section{margin-bottom:20px}
.section-toggle{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:background .12s}
.section-toggle:hover{background:var(--bg3)}
.section-toggle svg{width:12px;height:12px;transition:transform .2s}
.section-toggle.open svg{transform:rotate(90deg)}
.section-count{font-size:11px;color:var(--text3);margin-left:4px;font-weight:400}

.task-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-top:none;cursor:pointer;transition:background .1s;position:relative}
.task-row:hover{background:var(--bg3)}
.task-row:last-child{border-radius:0 0 8px 8px}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.task-check:hover{border-color:var(--accent)}
.task-check.done{background:var(--accent);border-color:var(--accent)}
.task-check.done::after{content:'✓';font-size:10px;color:#fff;font-weight:700}
.task-name{flex:1;font-size:14px;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-name.done{text-decoration:line-through;color:var(--text3)}
.task-tags{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;flex-shrink:0}
.tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.task-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.prio-flag{font-size:12px}
.dl-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.av-row{display:flex}
.tav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;border:2px solid var(--bg2);flex-shrink:0}
.tav+.tav{margin-left:-6px}
.status-pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;border:none;cursor:pointer;outline:none;white-space:nowrap}

/* ── FILTERS ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:6px;font-size:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .12s;font-weight:400;display:flex;align-items:center;gap:5px}
.filter-btn:hover{background:var(--bg4);color:var(--white)}
.filter-btn.active{background:rgba(29,158,117,.25);color:var(--accent-l);border-color:rgba(29,158,117,.4);font-weight:600}
.search-box{padding:6px 12px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:var(--bg3);color:var(--text);outline:none;width:200px}
.search-box::placeholder{color:var(--text3)}
.search-box:focus{border-color:rgba(29,158,117,.5)}
.count-lbl{margin-left:auto;font-size:12px;color:var(--text3)}

/* ── MESSAGING (Slack-style) ── */
.msg-wrap{display:flex;height:100%;overflow:hidden}
.msg-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ch-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch-header-name{font-size:16px;font-weight:700;color:var(--white)}
.ch-header-desc{font-size:12px;color:var(--text3)}
.ch-header-members{display:flex;margin-left:auto}
.messages-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:0}
.msg-group{margin-bottom:4px}
.msg-item{display:flex;gap:12px;padding:3px 20px;transition:background .1s;border-radius:4px;margin:0 -20px}
.msg-item:hover{background:rgba(255,255,255,.04)}
.msg-item.with-avatar{padding-top:10px;margin-top:2px}
.msg-av{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.msg-spacer{width:36px;flex-shrink:0}
.msg-content{flex:1;min-width:0}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.msg-author{font-size:14px;font-weight:700;color:var(--white)}
.msg-time{font-size:11px;color:var(--text3)}
.msg-text{font-size:14px;line-height:1.6;color:var(--text);word-break:break-word}
.msg-text .mention{color:#7EA7D3;font-weight:600;background:rgba(126,167,211,.15);padding:0 3px;border-radius:3px}
.msg-text .self-mention{color:var(--accent-l);font-weight:600;background:rgba(29,158,117,.2);padding:0 3px;border-radius:3px}
.task-ref{display:inline-flex;align-items:center;gap:7px;margin-top:6px;padding:8px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border2);font-size:12px;color:var(--text);cursor:pointer;border-left:3px solid var(--accent);transition:background .12s;max-width:400px}
.task-ref:hover{background:var(--bg4)}
.task-ref-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.task-ref-status{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;flex-shrink:0}

/* ── CHAT INPUT (Slack-style) ── */
.chat-input-wrap{padding:12px 20px 14px;flex-shrink:0}
.chat-input-box{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden;transition:border-color .15s}
.chat-input-box:focus-within{border-color:rgba(29,158,117,.4)}
.chat-input-toolbar{display:flex;align-items:center;gap:4px;padding:6px 10px 0}
.tool-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:4px 6px;border-radius:4px;transition:color .12s,background .12s}
.tool-btn:hover{color:var(--text);background:rgba(255,255,255,.08)}
.chat-textarea{width:100%;background:none;border:none;color:var(--text);font-size:14px;padding:8px 12px 10px;resize:none;outline:none;min-height:40px;max-height:150px;line-height:1.5}
.chat-textarea::placeholder{color:var(--text3)}
.chat-input-bottom{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 8px}
.chat-hint{font-size:11px;color:var(--text3)}
.send-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s}
.send-btn:hover{opacity:.88}
.send-btn:disabled{opacity:.35;cursor:default}

/* ── MENTION POPUP ── */
.mention-popup{position:absolute;bottom:100%;left:0;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;min-width:240px;max-height:200px;overflow-y:auto;display:none;margin-bottom:4px}
.mention-popup.open{display:block}
.mention-item{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;transition:background .1s}
.mention-item:hover,.mention-item.selected{background:rgba(29,158,117,.2)}
.m-av{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
.m-name{font-size:13px;font-weight:600;color:var(--white)}
.m-role{font-size:11px;color:var(--text3)}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:22px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.stat-value{font-size:28px;font-weight:700;color:var(--white)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:14px;font-weight:700;color:var(--white)}
.see-all-btn{font-size:12px;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:6px;padding:3px 10px;cursor:pointer;transition:background .12s}
.see-all-btn:hover{background:var(--bg3);color:var(--text)}

.comp-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:22px}
.comp-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;border-left:3px solid transparent}
.comp-name{font-size:13px;font-weight:700;color:var(--white);margin-bottom:6px}
.comp-pct{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700;float:right;margin-top:-22px}
.prog-bg{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:8px}
.prog-fill{height:100%;border-radius:2px;transition:width .5s ease}
.comp-meta{font-size:11px;color:var(--text3);margin-bottom:8px}
.owner-chips{display:flex;gap:5px;flex-wrap:wrap}
.owner-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.06);font-size:11px;color:var(--text2)}
.oc-av{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:#fff}

/* ── WORKLOAD ── */
.wl-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px}
.wl-av{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.wl-info{flex:1;min-width:0}
.wl-name{font-size:14px;font-weight:600;color:var(--white)}
.wl-role{font-size:11px;color:var(--text3)}
.wl-bar-wrap{display:flex;align-items:center;gap:10px;margin-top:7px}
.wl-bar-bg{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px}
.wl-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.wl-count{font-size:12px;font-weight:600;white-space:nowrap}
.wl-tasks-wrap{width:280px;flex-shrink:0}
.wl-task-chips{display:flex;flex-direction:column;gap:3px}
.wl-chip{font-size:11px;padding:3px 9px;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text2);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .1s}
.wl-chip:hover{background:rgba(255,255,255,.1);color:var(--white)}

/* ── DECISIONS ── */
.dec-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:10px;padding:14px 16px;margin-bottom:8px}
.dec-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:5px}
.dec-body{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.dec-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dec-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}

/* ── NOTIFICATIONS ── */
.notif-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:background .1s}
.notif-card:hover{background:var(--bg3)}
.notif-card.unread{border-left:3px solid var(--accent)}
.notif-icon{font-size:20px;line-height:1.3;flex-shrink:0}
.notif-msg{font-size:13px;line-height:1.5;margin-bottom:2px;color:var(--text)}
.notif-card.unread .notif-msg{font-weight:500;color:var(--white)}
.notif-time{font-size:11px;color:var(--text3)}
.unread-pip{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;margin-left:auto}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
.modal-title{font-size:16px;font-weight:700;color:var(--white)}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;line-height:1;padding:2px;border-radius:4px}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,.08)}
.modal-body{padding:16px 24px 24px}

<script>
const SUPABASE_URL = 'https://fdvtukcamwuewwpcquka.supabase.co';
const SUPABASE_KEY = 'sb_publishable_U2tLL_96U7jt-BPn7ByAVQ_RRKkevt_';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  realtime: { params: { eventsPerSecond: 10 } }
});
// Supabase auth entegrasyonu
async function supabaseLogin(email, pass) {
  const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
  return { data, error };
}
async function loadTasksFromDB() {
  const { data } = await _supabase.from('tasks').select('*').order('created_at', { ascending: false });
  return data;
}
async function saveTaskToDB(taskData) {
  const { data, error } = await _supabase.from('tasks').insert({
    title: taskData.title, description: taskData.desc, component: taskData.comp,
    unit: taskData.unit, status: taskData.status, priority: taskData.prio,
    deadline: taskData.dl || null, assignees: taskData.ass
  }).select().single();
  return data;
}
async function saveMsgToDB(channel, content, authorId) {
  await _supabase.from('messages').insert({ channel, author_id: authorId || null, content });
}
// Realtime görev dinleyici
function subscribeToTasks(onInsert, onUpdate, onDelete) {
  return _supabase.channel('tasks-realtime')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tasks' }, p => onInsert(p.new))
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'tasks' }, p => onUpdate(p.new))
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'tasks' }, p => onDelete(p.old))
    .subscribe();
}
function subscribeToMessages(channel, onMsg) {
  return _supabase.channel('msgs-' + channel)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages',
      filter: 'channel=eq.' + channel }, p => onMsg(p.new))
    .subscribe();
}
console.log('✅ Supabase bağlandı:', SUPABASE_URL);
</script>

// ── SOUND ENGINE ────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;

function getACtx() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function playMsgSound() {
  try {
    const ctx = getACtx();
    const t = ctx.currentTime;
    // Slack-like "pop" sound
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.exponentialRampToValueAtTime(660, t + 0.08);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.start(t); osc.stop(t + 0.2);
  } catch(e) {}
}

function playMentionSound() {
  try {
    const ctx = getACtx();
    const t = ctx.currentTime;
    // Double ping for mentions
    [0, 0.12].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1100, t + delay);
      osc.frequency.exponentialRampToValueAtTime(880, t + delay + 0.1);
      gain.gain.setValueAtTime(0, t + delay);
      gain.gain.linearRampToValueAtTime(0.22, t + delay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.22);
      osc.start(t + delay); osc.stop(t + delay + 0.25);
    });
  } catch(e) {}
}

function playNotifSound() {
  try {
    const ctx = getACtx();
    const t = ctx.currentTime;
    // Softer notification chime
    [880, 1100].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, t + i * 0.15);
      gain.gain.setValueAtTime(0, t + i * 0.15);
      gain.gain.linearRampToValueAtTime(0.15, t + i * 0.15 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.3);
      osc.start(t + i * 0.15); osc.stop(t + i * 0.15 + 0.35);
    });
  } catch(e) {}
}

function playTaskDoneSound() {
  try {
    const ctx = getACtx();
    const t = ctx.currentTime;
    // Rising success sound
    [440, 550, 660].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t + i * 0.1);
      gain.gain.linearRampToValueAtTime(0.12, t + i * 0.1 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.25);
      osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 0.3);
    });
  } catch(e) {}
}

function du(d){ if(!d)return null; return Math.ceil((new Date(d)-new Date().setHours(0,0,0,0))/86400000); }
function fmtDate(d){ if(!d)return '—'; return new Date(d+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'}); }
function fmtRel(iso){ const diff=Date.now()-new Date(iso).getTime(); const m=Math.floor(diff/60000); if(m<60)return 'bugün '+new Date(iso).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}); const h=Math.floor(m/60); if(h<24)return `${h} sa önce`; return `${Math.floor(h/24)} gün önce`; }

function dlTag(d,s){
  if(s==='done') return `<span class="dl-tag" style="background:rgba(136,135,128,.2);color:var(--text3)">Tamamlandı</span>`;
  if(!d) return '';
  const dd=du(d); let bg,t,l;
  if(dd<0){bg='rgba(226,75,74,.25)';t='#F87171';l=`${Math.abs(dd)}g geçti`}
  else if(dd===0){bg='rgba(240,165,0,.25)';t='#FFD166';l='Bugün'}
  else if(dd<=3){bg='rgba(240,165,0,.2)';t='#FFD166';l=`${dd}g kaldı`}
  else{bg='rgba(29,158,117,.2)';t='#4ECFA0';l=fmtDate(d)}
  return `<span class="dl-tag" style="background:${bg};color:${t}">${l}</span>`;
}
function avRow(ass=[]){
  return `<div class="av-row">${ass.slice(0,4).map(a=>{ const m=M[a]; return m?`<div class="tav" style="background:${m.c}" title="${m.n}">${m.i}</div>`:''; }).join('')}${ass.length>4?`<div class="tav" style="background:rgba(255,255,255,.12)">+${ass.length-4}</div>`:''}</div>`;
}
function compTag(id){ const c=COMPS[id]; return c?`<span class="tag" style="background:${c.bg};color:${c.t}">${c.s}</span>`:''; }
function unitTag(id){ const u=UNITS[id]; return u?`<span class="tag" style="background:${u.c}20;color:${u.c}">${u.l}</span>`:''; }
function statusPill(s,id){
  const ss=SS[s]||SS.todo;
  return `<select class="status-pill" style="background:${ss.bg};color:${ss.t}" onchange="qStatus(${id},this.value);event.stopPropagation()" onclick="event.stopPropagation()">
    ${Object.entries(SL).map(([k,v])=>`<option value="${k}"${s===k?' selected':''}>${v}</option>`).join('')}
  </select>`;
}

function taskRow(t){
  const dd=du(t.dl); let bl='';
  if(t.status!=='done'&&dd!==null){ if(dd<0) bl='border-left:2px solid var(--red)!important'; else if(dd<=2) bl='border-left:2px solid var(--amber)!important'; }
  return `<div class="task-row" style="${bl}" onclick="openDetail(${t.id})">
    <div class="task-check${t.status==='done'?' done':''}" onclick="toggleDone(${t.id});event.stopPropagation()"></div>
    <span class="prio-flag">${PFLAGS[t.prio]}</span>
    <span class="task-name${t.status==='done'?' done':''}">${t.title}</span>
    <div class="task-tags">${compTag(t.comp)}${t.unit?unitTag(t.unit):''}</div>
    <div class="task-right">
      ${dlTag(t.dl,t.status)}
      ${avRow(t.ass)}
      ${statusPill(t.status,t.id)}
    </div>
  </div>`;
}

// ── TASKS ─────────────────────────────────────────────────────────
function getFiltered(){
  let list=[...tasks];
  if(curComp!=='all') list=list.filter(t=>t.comp===curComp||t.unit===curComp);
  if(curSF!=='all') list=list.filter(t=>t.status===curSF);
  const q=(document.getElementById('tsearch')||{}).value||'';
  if(q) list=list.filter(t=>t.title.toLowerCase().includes(q.toLowerCase())||t.desc?.toLowerCase().includes(q.toLowerCase()));
  return list.sort((a,b)=>{ if(!a.dl)return 1; if(!b.dl)return -1; return new Date(a.dl)-new Date(b.dl); });
}
function renderTasks(){
  const list=getFiltered();
  const sfBtns=[{id:'all',l:'Tümü'},...Object.entries(SL).map(([id,l])=>({id,l}))].map(s=>`<button class="filter-btn${curSF===s.id?' active':''}" onclick="setSF('${s.id}')">${s.l}</button>`).join('');
  const grouped={ todo:[], inprogress:[], review:[], done:[] };
  list.forEach(t=>{ if(grouped[t.status]) grouped[t.status].push(t); else grouped.todo.push(t); });
  const sections=[
    {id:'inprogress',l:'Devam Ediyor',c:'#5B8DEF'},{id:'todo',l:'Yapılacak',c:'#96989D'},
    {id:'review',l:'İncelemede',c:'#F0A500'},{id:'done',l:'Tamamlandı',c:'#1D9E75'},
  ];
  const taskHtml=sections.map(s=>{
    const items=grouped[s.id]; if(!items.length&&curSF!=='all') return '';
    return `<div class="task-section">
      <div class="section-toggle open" onclick="this.classList.toggle('open');this.nextElementSibling.style.display=this.classList.contains('open')?'':'none'">
        <svg viewBox="0 0 12 12" fill="none"><path d="M4 2L8 6L4 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span style="color:${s.c}">${s.l}</span>
        <span class="section-count">${items.length} görev</span>
      </div>
      <div>${items.length?items.map(taskRow).join(''):'<div style="padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-top:none;font-size:12px;color:var(--text3)">Bu durumda görev yok.</div>'}</div>
    </div>`;
  }).join('');
  return `<div class="filter-bar">
    <input id="tsearch" class="search-box" placeholder="🔍 Görev ara..." oninput="liveSearch()"/>
    <div style="display:flex;gap:4px">${sfBtns}</div>
    <span class="count-lbl">${list.length} görev</span>
  </div>${taskHtml}`;
}
function setSF(s){ curSF=s; render(); }
function liveSearch(){ renderContent(); }
function toggleDone(id){
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.status=t.status==='done'?'todo':'done'; t.ua=new Date().toISOString().split('T')[0];
  if(t.status==='done'){ playTaskDoneSound(); toast('Görev tamamlandı! ✓','success'); }
  else toast('Görev yeniden açıldı');
  render();
}
function qStatus(id,v){
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.status=v; t.ua=new Date().toISOString().split('T')[0];
  if(v==='done'){ playTaskDoneSound(); toast('Tamamlandı! ✓','success'); }
  else toast('Durum güncellendi');
  if(curPage==='dashboard') render(); else renderContent();
}

// ── MESSAGES ─────────────────────────────────────────────────────
let mentionIdx=-1, mentionMatches=[];

function renderMessages(){
  const c=document.getElementById('content');
  c.className='';
  c.style.cssText='flex:1;overflow:hidden;display:flex;flex-direction:column;height:100%';
  c.innerHTML=buildChatHTML();
  scrollChat();
  // oninput attribute ile bağlı, addEventListener gerekmez
}

function buildChatHTML(){
  const ch=CHANNELS[curChannel];
  const msgs=messages[curChannel]||[];
  let msgHtml='';
  let lastAuthor='', lastTime=0;
  msgs.forEach((msg,i)=>{
    const m=M[msg.author]; if(!m) return;
    const t=new Date(msg.ca).getTime();
    const isNew=msg.author!==lastAuthor||(t-lastTime>5*60000);
    lastAuthor=msg.author; lastTime=t;
    const txt=renderMsgText(msg.text, msg.author);
    const task=msg.taskRef?tasks.find(t=>t.id===msg.taskRef):null;
    const taskHtml=task?`<div class="task-ref" onclick="openDetail(${task.id})"><span>📋</span><span class="task-ref-title">${task.title}</span><span class="task-ref-status" style="background:${(SS[task.status]||SS.todo).bg};color:${(SS[task.status]||SS.todo).t}">${SL[task.status]}</span></div>`:'';
    if(isNew){
      msgHtml+=`<div class="msg-item with-avatar">
        <div class="msg-av" style="background:${m.c}">${m.i}</div>
        <div class="msg-content">
          <div class="msg-header"><span class="msg-author">${m.n}</span><span class="msg-time">${fmtRel(msg.ca)}</span></div>
          <div class="msg-text">${txt}${taskHtml}</div>
        </div>
      </div>`;
    } else {
      msgHtml+=`<div class="msg-item">
        <div class="msg-spacer"></div>
        <div class="msg-content"><div class="msg-text">${txt}${taskHtml}</div></div>
      </div>`;
    }
  });

  // Members
  const allMembers=ML.map(m=>`<div class="tav" style="background:${m.c};width:26px;height:26px;font-size:8px;border-radius:6px" title="${m.n}">${m.i}</div>`).join('');

  return `<div class="msg-main" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="ch-header">
      <div><div class="ch-header-name">#${ch.name}</div><div class="ch-header-desc">${ch.desc}</div></div>
      <div class="ch-header-members" style="gap:3px">${allMembers}</div>
    </div>
    <div class="messages-area" id="messages-area">
      <div style="padding:20px 0 10px;border-bottom:1px solid var(--border);margin-bottom:16px">
        <div style="font-size:24px;margin-bottom:4px">#</div>
        <div style="font-size:18px;font-weight:700;color:var(--white)">${ch.name}</div>
        <div style="font-size:13px;color:var(--text3);margin-top:3px">${ch.desc} — Bu kanalın başlangıcı budur.</div>
      </div>
      ${msgHtml||'<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">Henüz mesaj yok. İlk mesajı gönderin!</div>'}
    </div>
    <div class="chat-input-wrap">
      <div class="chat-input-box" style="position:relative">
        <div id="mention-popup" class="mention-popup"></div>
        <textarea class="chat-textarea" id="chat-ta" rows="1" placeholder="#${ch.name} kanalına mesaj yaz..." onkeydown="chatKeyDown(event)" oninput="onChatInput(event)"></textarea>
        <div class="chat-input-bottom">
          <span class="chat-hint">@mention · /task görev bağla · Enter gönder</span>
          <button class="send-btn" onclick="sendMsg()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 7L1 13V8.5L9 7L1 5.5V1Z" fill="white"/></svg>
            Gönder
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderMsgText(text, authorId){
  return text.replace(/@(\w+\.\w+)/g,(match,uid)=>{
    const mm=M[uid];
    if(!mm) return match;
    const isSelf=CU&&uid===CU.id;
    return `<span class="${isSelf?'self-mention':'mention'}">@${mm.n}</span>`;
  });
}

function scrollChat(){ setTimeout(()=>{ const ma=document.getElementById('messages-area'); if(ma) ma.scrollTop=ma.scrollHeight; },50); }

function chatKeyDown(e){
  const popup=document.getElementById('mention-popup');
  if(popup&&popup.classList.contains('open')){
    if(e.key==='ArrowDown'){ e.preventDefault(); mentionIdx=Math.min(mentionIdx+1,mentionMatches.length-1); highlightMention(); return; }
    if(e.key==='ArrowUp'){ e.preventDefault(); mentionIdx=Math.max(mentionIdx-1,0); highlightMention(); return; }
    if(e.key==='Enter'||e.key==='Tab'){ e.preventDefault(); if(mentionIdx>=0&&mentionMatches[mentionIdx]) insertMention(mentionMatches[mentionIdx].id); return; }
    if(e.key==='Escape'){ closeMentionPopup(); return; }
  }
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
}

function highlightMention(){
  const items=document.querySelectorAll('#mention-popup .mention-item');
  items.forEach((el,i)=>el.classList.toggle('selected',i===mentionIdx));
}

function onChatInput(e){
  const el=e.target||document.getElementById('chat-ta');
  if(!el) return;
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,150)+'px';
  const val=el.value;
  const cursor=el.selectionStart!=null?el.selectionStart:val.length;
  const beforeCursor=val.slice(0,cursor);
  const lastAt=beforeCursor.lastIndexOf('@');
  const popup=document.getElementById('mention-popup');
  if(!popup) return;
  if(lastAt>=0){
    const q=beforeCursor.slice(lastAt+1).toLowerCase();
    if(q.includes(' ')){ closeMentionPopup(); return; }
    mentionMatches=ML.filter(m=>{
      const parts=m.n.toLowerCase().split(' ');
      return parts.some(p=>p.startsWith(q))||m.id.toLowerCase().includes(q);
    });
    if(mentionMatches.length){
      mentionIdx=-1;
      popup.innerHTML=mentionMatches.map(m=>`<div class="mention-item" onclick="insertMention('${m.id}')" style="display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;" onmouseover="this.style.background='rgba(29,158,117,.2)'" onmouseout="this.style.background=''"><div style="background:${m.c};width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0">${m.i}</div><div><div style="font-size:13px;font-weight:600;color:var(--white)">${m.n}</div><div style="font-size:11px;color:var(--text3)">${m.r}</div></div></div>`).join('');
      popup.classList.add('open'); return;
    }
  }
  closeMentionPopup();
}

function closeMentionPopup(){ const p=document.getElementById('mention-popup'); if(p) p.classList.remove('open'); mentionMatches=[]; mentionIdx=-1; }

function insertMention(uid){
  const ta=document.getElementById('chat-ta'); if(!ta) return;
  const val=ta.value; const cursor=ta.selectionStart!=null?ta.selectionStart:val.length;
  const before=val.slice(0,cursor); const lastAt=before.lastIndexOf('@');
  if(lastAt<0) return;
  ta.value=val.slice(0,lastAt)+'@'+uid+' '+val.slice(cursor);
  const np=lastAt+uid.length+2; ta.setSelectionRange(np,np);
  closeMentionPopup(); ta.focus();
}

function sendMsg(){
  const ta=document.getElementById('chat-ta'); if(!ta) return;
  const text=ta.value.trim(); if(!text) return;
  if(!messages[curChannel]) messages[curChannel]=[];
  const newMsg={ id:MSGID++, author:CU.id, text, ca:new Date().toISOString(), taskRef:null };
  messages[curChannel].push(newMsg);
  ta.value=''; ta.style.height='auto';
  closeMentionPopup();

  // Append to UI
  const ma=document.getElementById('messages-area');
  if(ma){
    const m=M[CU.id];
    const div=document.createElement('div');
    div.className='msg-item with-avatar';
    div.innerHTML=`<div class="msg-av" style="background:${m.c}">${m.i}</div>
      <div class="msg-content">
        <div class="msg-header"><span class="msg-author">${m.n}</span><span class="msg-time">şimdi</span></div>
        <div class="msg-text">${renderMsgText(text,CU.id)}</div>
      </div>`;
    ma.appendChild(div);
    ma.scrollTop=ma.scrollHeight;
    playMsgSound();
  }

  // Check mentions
  const mentioned=(text.match(/@(\w+\.\w+)/g)||[]).map(s=>s.slice(1)).filter(uid=>uid!==CU.id&&M[uid]);
  if(mentioned.length){
    mentioned.forEach(uid=>{ pushNotif('mention',`${CU.n} #${CHANNELS[curChannel].name} kanalında @${M[uid].n}'i etiketledi.`); });
    playMentionSound();
    toast(`@mention gönderildi — ${mentioned.map(uid=>M[uid].n).join(', ')}`, 'mention');
  }

  updateSidebarUnread();
}

function updateSidebarUnread(){
  Object.entries(unread).forEach(([id,cnt])=>{
    const el=document.getElementById('ub-'+id);
    if(el){ el.style.display=cnt?'':'none'; el.textContent=cnt; }
  });
  updateBadges();
}

function renderNotifications(){
  const un=notifs.filter(n=>!n.read).length;

      ${un?`<button style="font-size:12px;color:var(--text2);background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 12px;cursor:pointer" onclick="markAllRead()">Tümünü okundu işaretle</button>`:''}
    </div>
    ${notifs.map(n=>`<div class="notif-card${n.read?'':' unread'}" onclick="markRead(${n.id})">
      <span class="notif-icon">${NI[n.type]||'🔔'}</span>
      <div style="flex:1"><div class="notif-msg">${n.msg}</div><div class="notif-time">${fmtRel(n.ca)}</div></div>
      ${!n.read?'<div class="unread-pip"></div>':''}
    </div>`).join('')}
    ${!notifs.length?'<div style="text-align:center;padding:40px;color:var(--text3)">Henüz bildirim yok.</div>':''}
  </div>`;
}
function markRead(id){ const n=notifs.find(n=>n.id===id); if(!n||n.read)return; n.read=true; updateBadges(); if(curPage==='notifications') renderContent(); }
function markAllRead(){ notifs.forEach(n=>n.read=true); updateBadges(); renderContent(); }
function updateBadges(){
  const nc=notifs.filter(n=>!n.read).length;
  const nb=document.getElementById('notif-badge'); if(nb){ nb.style.display=nc?'':'none'; nb.textContent=nc; }
}
function pushNotif(type,msg){ notifs.unshift({id:NID++,type,msg,read:false,ca:new Date().toISOString()}); updateBadges(); playNotifSound(); }

// ── TASK FORM ──────────────────────────────────────────────────────
function openTaskForm(editId=null){
  editingId=editId; selAssignees=[];
  document.getElementById('form-title').textContent=editId?'Görevi Düzenle':'Yeni Görev';
  document.getElementById('save-btn').textContent=editId?'Güncelle':'Görev Oluştur';
  const def=new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  ['f-title','f-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-comp').value='gof';
  document.getElementById('f-unit').value='';
  document.getElementById('f-status').value='todo';
  document.getElementById('f-prio').value='medium';
  document.getElementById('f-dl').value=def;
  if(editId){ const t=tasks.find(t=>t.id===editId); if(!t) return;
    document.getElementById('f-title').value=t.title;
    document.getElementById('f-desc').value=t.desc||'';
    document.getElementById('f-comp').value=t.comp;
    document.getElementById('f-unit').value=t.unit||'';
    document.getElementById('f-status').value=t.status;
    document.getElementById('f-prio').value=t.prio;
    document.getElementById('f-dl').value=t.dl||'';
    selAssignees=[...t.ass];
  }
  renderAG(); document.getElementById('task-modal').style.display='flex';
  setTimeout(()=>document.getElementById('f-title').focus(),60);
}
function renderAG(){
  document.getElementById('ag').innerHTML=ML.map(m=>{
    const sel=selAssignees.includes(m.id);
    return `<button class="a-chip${sel?' sel':''}" style="${sel?`background:${m.c}25;border-color:${m.c};color:${m.c}`:'color:var(--text2)'}" onclick="toggleA('${m.id}')">
      <div class="a-chip-av" style="background:${m.c}">${m.i}</div>${m.n}
    </button>`;
  }).join('');
}
function toggleA(id){ selAssignees=selAssignees.includes(id)?selAssignees.filter(a=>a!==id):[...selAssignees,id]; renderAG(); }
function closeTaskModal(){ document.getElementById('task-modal').style.display='none'; editingId=null; }
function saveTask(){
  const title=document.getElementById('f-title').value.trim(); if(!title) return;
  const now=new Date().toISOString().split('T')[0];
  const data={ title, desc:document.getElementById('f-desc').value.trim(), comp:document.getElementById('f-comp').value,
    unit:document.getElementById('f-unit').value, status:document.getElementById('f-status').value,
    prio:document.getElementById('f-prio').value, dl:document.getElementById('f-dl').value,
    ass:[...selAssignees], ua:now };
  if(editingId){ const t=tasks.find(t=>t.id===editingId); Object.assign(t,data); toast('Görev güncellendi','info'); }
  else { tasks.push({id:++NID,...data,cmt:[],ca:now}); toast('Görev oluşturuldu!','success');
    if(selAssignees.length){ pushNotif('assigned',`"${title}" görevi atandı.`); } }
  closeTaskModal(); render();
}

// ── DECISION FORM ──────────────────────────────────────────────────
function openDecModal(){
  ['dc-title','dc-body'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('dc-type').value='operational';
  document.getElementById('dc-comp').value='';
  document.getElementById('dc-owner').innerHTML=ML.map(m=>`<option value="${m.id}">${m.n}</option>`).join('');
  document.getElementById('dec-modal').style.display='flex';
}
function closeDecModal(){ document.getElementById('dec-modal').style.display='none'; }
function saveDecision(){
  const title=document.getElementById('dc-title').value.trim(); if(!title) return;
  decisions.push({id:++NID,title,body:document.getElementById('dc-body').value.trim(),type:document.getElementById('dc-type').value,comp:document.getElementById('dc-comp').value,owner:document.getElementById('dc-owner').value,date:new Date().toISOString().split('T')[0]});
  closeDecModal(); toast('Karar kaydedildi','success'); render();
}

// ── DETAIL ────────────────────────────────────────────────────────
function openDetail(id){
  curDetailId=id; const t=tasks.find(t=>t.id===id); if(!t) return;
  document.getElementById('dt-title').textContent=t.title;
  const ss=SS[t.status]||SS.todo;
  document.getElementById('dt-badges').innerHTML=`${compTag(t.comp)}${t.unit?unitTag(t.unit):''}${dlTag(t.dl,t.status)}<span class="tag" style="background:${ss.bg};color:${ss.t}">${SL[t.status]}</span><span class="tag" style="background:${PC[t.prio]}22;color:${PC[t.prio]}">${PFLAGS[t.prio]} ${PL[t.prio]}</span>`;
  const dd=document.getElementById('dt-desc');
  if(t.desc){dd.textContent=t.desc;dd.style.display='block';}else dd.style.display='none';
  document.getElementById('dt-assignees').innerHTML=t.ass.length?t.ass.map(a=>{ const m=M[a]; return m?`<div style="display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;background:${m.c}20;border:1px solid ${m.c}35"><div style="width:18px;height:18px;border-radius:4px;background:${m.c};display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff">${m.i}</div><span style="font-size:12px;font-weight:600;color:${m.c}">${m.n}</span></div>`:'' }).join(''):'<span style="font-size:12px;color:var(--text3)">Atanmamış</span>';
  document.getElementById('dt-meta').innerHTML=`<div><div class="dm-label">Deadline</div><div class="dm-val">${fmtDate(t.dl)}</div></div><div><div class="dm-label">Öncelik</div><div class="dm-val">${PFLAGS[t.prio]} ${PL[t.prio]}</div></div><div><div class="dm-label">Oluşturulma</div><div class="dm-val">${fmtDate(t.ca)}</div></div><div><div class="dm-label">Güncelleme</div><div class="dm-val">${fmtDate(t.ua)}</div></div>`;
  renderComments(t);
  document.getElementById('cin').value='';
  document.getElementById('detail-modal').style.display='flex';
}
function renderComments(t){
  document.getElementById('dt-ctitle').textContent=`Yorumlar (${t.cmt.length})`;
  document.getElementById('dt-comments').innerHTML=t.cmt.map(c=>{ const m=M[c.aid]; const own=c.aid===CU?.id;
    return `<div class="comment-item"><div class="c-av" style="background:${m?.c||'#888'}">${m?.i||'?'}</div>
      <div class="c-body"><div class="c-header"><span class="c-author">${m?.n||'?'}</span><div style="display:flex;align-items:center;gap:4px"><span class="c-time">${fmtRel(c.ca)}</span>${own?`<button class="c-del" onclick="delCmt(${t.id},${c.id})">×</button>`:''}</div></div><div class="c-text">${c.txt}</div></div>
    </div>`;
  }).join('');
}
function addComment(){ const inp=document.getElementById('cin'); if(!inp) return; const txt=inp.value.trim(); if(!txt) return;
  const t=tasks.find(t=>t.id===curDetailId); if(!t) return;
  t.cmt.push({id:Date.now(),aid:CU.id,txt,ca:new Date().toISOString()});
  inp.value=''; renderComments(t);
  playMsgSound();
  pushNotif('comment_added',`"${t.title}" görevine yorum eklendi.`);
}
function delCmt(tid,cid){ const t=tasks.find(t=>t.id===tid); if(!t)return; t.cmt=t.cmt.filter(c=>c.id!==cid); renderComments(t); }
function closeDetail(){ document.getElementById('detail-modal').style.display='none'; curDetailId=null; }
function editCurTask(){ const id=curDetailId; closeDetail(); openTaskForm(id); }
function deleteTask(id){ tasks=tasks.filter(t=>t.id!==id); toast('Görev silindi'); render(); }

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  const icons={success:'✓',error:'✗',mention:'@',info:'·'};
  el.innerHTML=`<span style="font-size:16px">${icons[type]||'·'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; el.style.transition='all .3s'; setTimeout(()=>el.remove(),300); },3500);
}

// ── SIDEBAR UNREAD INIT ───────────────────────────────────────────
function initSidebarUnread(){
  // Create hidden badge spans for each channel
  document.querySelectorAll('.ch-item').forEach(btn=>{
    const ch=btn.dataset.ch;
    if(ch&&!document.getElementById('ub-'+ch)){
      const span=document.createElement('span');
      span.id='ub-'+ch;
      span.className='ch-unread-num';
      span.style.display='none';
      btn.appendChild(span);
    }
  });
}

// ── INIT ──────────────────────────────────────────────────────────
document.getElementById('li-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.addEventListener('DOMContentLoaded',()=>{ initSidebarUnread(); });
setTimeout(initSidebarUnread, 100);
</script>

<script>
// ══ SUPABASE REALTIME FIX ══
let _realtimeBooted = false;

async function loadFromSupabase() {
  if (!_supabase) return;
  try {
    // Görevleri yükle
    const { data: dbTasks } = await _supabase.from('tasks').select('*').order('created_at',{ascending:false});
    if (dbTasks && dbTasks.length > 0) {
      tasks = dbTasks.map(t=>({
        id:t.id, title:t.title, desc:t.description, comp:t.component,
        unit:t.unit, status:t.status, prio:t.priority, dl:t.deadline,
        ass:t.assignees||[], cmt:[], ca:t.created_at?.split('T')[0], ua:t.updated_at?.split('T')[0]
      }));
      render();
      toast('Veriler yüklendi ✓','success');
    }

    // Mesajları yükle — tüm kanallar
    const { data: dbMsgs } = await _supabase.from('messages').select('*').order('created_at',{ascending:true});
    if (dbMsgs) {
      Object.keys(messages).forEach(k=>messages[k]=[]);
      dbMsgs.forEach(m=>{
        if(!messages[m.channel]) messages[m.channel]=[];
        if(!messages[m.channel].find(x=>x.id===m.id))
          messages[m.channel].push({id:m.id,author:m.author_id,text:m.content,ca:m.created_at,taskRef:null});
      });
      if(curPage==='messages') renderMessages();
    }

    if (_realtimeBooted) return;
    _realtimeBooted = true;

    // Realtime — görevler
    _supabase.channel('rt-tasks').on('postgres_changes',{event:'*',schema:'public',table:'tasks'},p=>{
      if(p.eventType==='INSERT'){
        const t=p.new;
        if(!tasks.find(x=>x.id===t.id)){
          tasks.unshift({id:t.id,title:t.title,desc:t.description,comp:t.component,unit:t.unit,status:t.status,prio:t.priority,dl:t.deadline,ass:t.assignees||[],cmt:[],ca:t.created_at?.split('T')[0],ua:t.updated_at?.split('T')[0]});
          render(); playNotifSound(); toast('Yeni görev atandı!','info');
        }
      } else if(p.eventType==='UPDATE'){
        const idx=tasks.findIndex(x=>x.id===p.new.id);
        if(idx>=0){ const t=p.new; tasks[idx]={...tasks[idx],title:t.title,desc:t.description,status:t.status,prio:t.priority,dl:t.deadline,ass:t.assignees||[],ua:t.updated_at?.split('T')[0]}; render(); }
      } else if(p.eventType==='DELETE'){
        tasks=tasks.filter(x=>x.id!==p.old.id); render();
      }
    }).subscribe();

    // Realtime — mesajlar (tüm kanallar tek subscriber)
    _supabase.channel('rt-messages').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>{
      const m=p.new;
      if(!messages[m.channel]) messages[m.channel]=[];
      if(messages[m.channel].find(x=>x.id===m.id)) return; // duplicate önle
      messages[m.channel].push({id:m.id,author:m.author_id,text:m.content,ca:m.created_at,taskRef:null});

      const isMyMsg = m.author_id===CU?.id;
      const isActiveChannel = curPage==='messages' && curChannel===m.channel;

      if(isActiveChannel && !isMyMsg){
        // Ekrana ekle
        const ma=document.getElementById('messages-area');
        if(ma){
          const author=M[m.author_id];
          if(author){
            const div=document.createElement('div');
            div.className='msg-item with-avatar';
            div.innerHTML=`<div class="msg-av" style="background:${author.c}">${author.i}</div>
              <div class="msg-content">
                <div class="msg-header"><span class="msg-author">${author.n}</span><span class="msg-time">az önce</span></div>
                <div class="msg-text">${renderMsgText(m.content,m.author_id)}</div>
              </div>`;
            ma.appendChild(div); ma.scrollTop=ma.scrollHeight;
          }
        }
        playMsgSound();
      } else if(!isActiveChannel && !isMyMsg){
        unread[m.channel]=(unread[m.channel]||0)+1;
        updateSidebarUnread();
        playNotifSound();
      }

      // @mention — beni etiketlediler mi?
      if(CU && !isMyMsg && m.content.includes('@'+CU.id)){
        pushNotif('mention', (M[m.author_id]?.n||'Biri')+' sizi #'+(CHANNELS[m.channel]?.name||m.channel)+' kanalında etiketledi.');
        playMentionSound();
        toast('@mention: '+(M[m.author_id]?.n||'')+' → #'+(CHANNELS[m.channel]?.name||m.channel),'mention');
      }
    }).subscribe();

  } catch(e){ console.error('Supabase hata:',e); }
}

// initApp override — her login'de Supabase'den yükle
const _origInitApp = window.initApp;
window.initApp = function(){
  _origInitApp && _origInitApp();
  setTimeout(()=>{ if(_supabase && window.CU) loadFromSupabase(); }, 500);
};

// sendMsg override — Supabase'e kaydet
const _origSendMsg = window.sendMsg;
window.sendMsg = async function(){
  const ta=document.getElementById('chat-ta'); if(!ta) return;
  const text=ta.value.trim(); if(!text) return;
  if(!messages[curChannel]) messages[curChannel]=[];
  const localMsg={id:'local-'+Date.now(),author:CU.id,text,ca:new Date().toISOString(),taskRef:null};
  messages[curChannel].push(localMsg);
  ta.value=''; ta.style.height='auto';
  closeMentionPopup();

  // UI'a ekle
  const ma=document.getElementById('messages-area');
  if(ma){
    const m=M[CU.id];
    const div=document.createElement('div');
    div.className='msg-item with-avatar';
    div.innerHTML=`<div class="msg-av" style="background:${m.c}">${m.i}</div>
      <div class="msg-content">
        <div class="msg-header"><span class="msg-author">${m.n}</span><span class="msg-time">şimdi</span></div>
        <div class="msg-text">${renderMsgText(text,CU.id)}</div>
      </div>`;
    ma.appendChild(div); ma.scrollTop=ma.scrollHeight;
    playMsgSound();
  }

  // Supabase'e kaydet
  if(_supabase){
    const {data,error} = await _supabase.from('messages').insert({channel:curChannel,author_id:CU.id,content:text}).select().single();
    if(data){ localMsg.id=data.id; } // local id'yi gerçek id ile değiştir
    if(error) console.error('Mesaj kaydedilemedi:',error);
  }

  // @mention bildirimi
  const mentioned=(text.match(/@(\w+\.\w+)/g)||[]).map(s=>s.slice(1)).filter(uid=>uid!==CU.id&&M[uid]);
  if(mentioned.length){ playMentionSound(); toast('@mention gönderildi','mention'); }
  updateSidebarUnread();
};

// saveTask override — Supabase'e kaydet
const _origSaveTask = window.saveTask;
window.saveTask = async function(){
  const title=document.getElementById('f-title').value.trim(); if(!title) return;
  const now=new Date().toISOString().split('T')[0];
  const data={title,desc:document.getElementById('f-desc').value.trim(),comp:document.getElementById('f-comp').value,
    unit:document.getElementById('f-unit').value,status:document.getElementById('f-status').value,
    prio:document.getElementById('f-prio').value,dl:document.getElementById('f-dl').value,
    ass:[...selAssignees],ua:now};

  if(editingId){
    const t=tasks.find(t=>t.id===editingId); Object.assign(t,data);
    // Supabase güncelle
    if(_supabase) await _supabase.from('tasks').update({title:data.title,description:data.desc,component:data.comp,unit:data.unit,status:data.status,priority:data.prio,deadline:data.dl||null,assignees:data.ass}).eq('id',editingId);
    toast('Görev güncellendi','info');
  } else {
    const localId=++NID;
    tasks.push({id:localId,...data,cmt:[],ca:now});
    toast('Görev oluşturuldu!','success');
    // Supabase kaydet
    if(_supabase){
      const {data:dbTask} = await _supabase.from('tasks').insert({title:data.title,description:data.desc,component:data.comp,unit:data.unit,status:data.status,priority:data.prio,deadline:data.dl||null,assignees:data.ass}).select().single();
      if(dbTask){ const idx=tasks.findIndex(t=>t.id===localId); if(idx>=0) tasks[idx].id=dbTask.id; }
    }
    if(selAssignees.length) pushNotif('assigned','"'+title+'" görevi atandı.');
  }
  closeTaskModal(); render();
};
</script>
